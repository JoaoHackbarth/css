<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <title>Texto e estilo de fontes</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <i class="fa-chisel fa-regular fa-address-card"></i>
        <style>
            h1{
                color: green;
                text-align: center;
                text-decoration: overline;
                text-decoration-color: red;
                text-decoration-thickness: 5px;
                font-family: cursive;
                font-size: 60px;
                font-weight: 1;
            }
            h2{
                text-decoration: underline;
                font-family: monospace;
                font-style: italic;
                font-weight: 100;
                text-shadow: firebrick 1px 0 10px;
            }
            h3{
                text-decoration: line-through;
                font-family: sans-serif;
                text-decoration-color: blueviolet;
                text-transform: capitalize;
            }
            h4{
                text-decoration: overline underline;
                font-family: "Broadway" cursive;
                text-transform: uppercase;
            }
            p{
                text-shadow: violet 1px 0 10px;
                line-height: 1.6;
                letter-spacing: 4px;
                word-spacing: 4px;
            }
        </style>
    </head>
    <body>
        <table>
            <h1>Texto e estilo de fontes</h1>
            <h2>Texto e estilo de fontes</h2>
            <h3>Texto e estilo de fontes</h3>
            <h4>Texto e estilo de fontes</h4>
        </table>
        <p>Espaçamento CSS</p>
    </body>
</html>
