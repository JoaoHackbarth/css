<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <style>
            div{
                border: 2px solid #333;
                border-radius: 15px;
                border-color: lightgrey;
                background-color: white;
                width: 720px;
                text-align: center;
                font-family: "Roboto", sans-serif;
            }
            .ti{
                color: black;
                text-align: left;
                padding-left: 20px;
                margin-right: 10px;
                font-family: "Roboto", sans-serif;

            }
            .pi{
                color: #333;
                text-align: left;
                padding-left: 20px;
                letter-spacing: 0px;
                padding-right: 20px;
                font-family: "Roboto", sans-serif;
            }
            .si{
                color: lightgrey;
                text-align: left;
                padding-left: 20px;
                font-family: "Roboto", sans-serif;
            }
            a{
                color: grey;
                position: relative;
                padding-right: 0px;
                font-family: "Roboto", sans-serif;
                float: right;
            }
            .se{
                position: relative;
                margin: 5px;
                border: 10px 20px;
                border-color: lightgrey;
                border-radius: 15px; 
                background-color: white; 
            }
            button{
                position: relative;
                float: right;
                margin-right: 10px;
                background-color: white;
                width: 90px;
                border-radius: 5px;
                border-color: lightgrey;
                border-style: solid;
               
            }
        </style>
    </head>
    <body>
        <div>
            <table>
                <p class="ti"><i class="fa-brands fa-aws"></i><strong>&nbsp;&nbsp;aws4embeddedlinux / meta-aws</strong><button><a class="se"><i class="fa-regular fa-star" style="color: rgb(164, 174, 178); margin-left: -20px;">&nbsp;&nbsp;</i>&nbsp;Star&nbsp;|&nbsp;<i class="fa-solid fa-angle-down" style="color: rgb(164, 174, 178);"></i></a></button></p>
                <p class="pi">The metadata layer for baking AWS device software to Embedded Linux distributions built by the Yocto Project build system</p>
                <p class="si"><i class="fa-solid fa-circle" style="color: rgb(116, 192, 252);"></i> BitBake &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<i class="fa-regular fa-star" style="color: rgb(164, 174, 178);">&nbsp;85</i></p>
            </table>
        </div>
    </body>
</html>
